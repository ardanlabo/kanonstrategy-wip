.t-sep { width: 1px; height: 16px; background: rgba(201,168,76,0.25); }
.t-brand { font-family: 'IBM Plex Mono', monospace; font-size: 12px; font-weight: 500; letter-spacing: 0.18em; color: rgba(255,255,255,0.85); }
.t-div { width: 0.5px; height: 20px; background: rgba(255,255,255,0.08); }
.t-product { font-family: 'IBM Plex Serif', serif; font-weight: 300; font-size: 14px; color: rgba(255,255,255,0.55); }
.t-ctx { font-family: 'IBM Plex Mono', monospace; font-size: 9px; color: rgba(255,255,255,0.18); letter-spacing: 0.1em; }
.tr { display: flex; align-items: center; gap: 12px; }
.t-back { font-family: 'Inter', sans-serif; font-size: 11px; color: rgba(255,255,255,0.2); text-decoration: none; transition: color 0.2s; }
.t-back:hover { color: rgba(201,168,76,0.65); }

.body-wrap { flex: 1; display: flex; overflow: hidden; position: relative; }
.graph-wrap { flex: 1; position: relative; overflow: hidden; }
#svg { width: 100%; height: 100%; display: block; cursor: default; }

/* GUIDED TOUR BAR */
.tour-bar {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: rgba(10,14,21,0.96);
  border-top: 0.5px solid rgba(255,255,255,0.07);
  padding: 14px 24px;
  display: flex; align-items: center; justify-content: space-between;
  z-index: 30;
}
.tour-left { display: flex; align-items: center; gap: 16px; }
.tour-steps { display: flex; gap: 6px; }
.tour-step-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: rgba(255,255,255,0.15);
  cursor: pointer; transition: all 0.2s;
}
.tour-step-dot.active { background: #C9A84C; box-shadow: 0 0 5px rgba(201,168,76,0.5); }
.tour-step-dot.done { background: rgba(201,168,76,0.4); }
.tour-counter { font-family: 'IBM Plex Mono', monospace; font-size: 9px; color: rgba(255,255,255,0.2); letter-spacing: 0.1em; }
.tour-message { flex: 1; padding: 0 24px; }
.tour-step-label { font-family: 'IBM Plex Mono', monospace; font-size: 9px; color: rgba(201,168,76,0.6); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 3px; }
.tour-step-text { font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 300; color: rgba(255,255,255,0.65); }
.tour-right { display: flex; gap: 10px; }
.tour-btn {
  font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 0.09em;
  padding: 7px 18px; cursor: pointer; transition: all 0.2s;
  border: 0.5px solid rgba(255,255,255,0.12);
  background: transparent; color: rgba(255,255,255,0.35);
}
.tour-btn:hover { color: rgba(255,255,255,0.7); border-color: rgba(255,255,255,0.25); }
.tour-btn.primary {
  border-color: rgba(201,168,76,0.4); color: #C9A84C; background: rgba(201,168,76,0.06);
}
.tour-btn.primary:hover { background: rgba(201,168,76,0.12); border-color: #C9A84C; }
.tour-btn.done-btn { border-color: rgba(34,197,94,0.4); color: #22c55e; background: rgba(34,197,94,0.06); }

/* LEGEND */
.legend { position: absolute; top: 14px; left: 16px; pointer-events: none; display: flex; flex-direction: column; gap: 12px; z-index: 10; }
.lg-title { font-family: 'IBM Plex Mono', monospace; font-size: 8px; color: rgba(255,255,255,0.14); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 3px; }
.lg-row { display: flex; align-items: center; gap: 7px; margin-bottom: 3px; }
.lg-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.lg-diamond { width: 7px; height: 7px; border: 1.5px solid #C9A84C; transform: rotate(45deg); flex-shrink: 0; }
.lg-lbl { font-family: 'IBM Plex Mono', monospace; font-size: 8px; color: rgba(255,255,255,0.2); }
.lg-line { width: 16px; height: 1px; flex-shrink: 0; }
.lg-moon { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

/* SIDEBAR PANEL */
.panel {
  position: absolute; top: 0; right: 0; bottom: 52px;

  border-left: 0.5px solid rgba(255,255,255,0.07);

.pb { flex: 1; overflow-y: auto; }

.pb::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); }
.ptype { font-family: 'IBM Plex Mono', monospace; font-size: 8px; letter-spacing: 0.11em; text-transform: uppercase; margin-bottom: 4px; }
.pname { font-family: 'IBM Plex Serif', serif; font-weight: 300; font-size: 15px; color: #fff; line-height: 1.3; }
.pscore-row { display: flex; align-items: center; gap: 8px; margin-top: 6px; }
.pscore-lbl { font-family: 'IBM Plex Mono', monospace; font-size: 8px; color: rgba(255,255,255,0.2); }
.spill { font-family: 'IBM Plex Mono', monospace; font-size: 9px; font-weight: 500; padding: 2px 7px; }
.psec { padding: 10px 15px; border-bottom: 0.5px solid rgba(255,255,255,0.05); }
.psec-lbl { font-family: 'IBM Plex Mono', monospace; font-size: 8px; letter-spacing: 0.09em; color: rgba(201,168,76,0.36); text-transform: uppercase; margin-bottom: 6px; }
.plinks { display: flex; flex-direction: column; gap: 5px; }
.plrow { display: flex; align-items: center; gap: 7px; }
.plname { font-family: 'Inter', sans-serif; font-size: 11px; color: rgba(255,255,255,0.4); }
.pltype { font-family: 'IBM Plex Mono', monospace; font-size: 8px; color: rgba(255,255,255,0.15); }
.pzones { display: flex; flex-direction: column; gap: 4px; }
.pzrow { display: flex; align-items: center; gap: 6px; }
.pzdot { width: 4px; height: 4px; border-radius: 50%; background: #C9A84C; opacity: 0.42; flex-shrink: 0; }
.pzlbl { font-family: 'Inter', sans-serif; font-size: 11px; color: rgba(255,255,255,0.36); }
.pnote { font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 300; color: rgba(255,255,255,0.28); line-height: 1.65; }
.pmoons { display: flex; flex-wrap: wrap; gap: 5px; }

.pmoon-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.pmoon-lbl { font-family: 'Inter', sans-serif; font-size: 10px; color: rgba(255,255,255,0.38); }
.pcontacts { display: flex; flex-direction: column; gap: 8px; }

const BASE_LINKS=[], ABC_LINKS=[];
const seen=new Set();
NODES.forEach(n=>{
  (n.links||[]).forEach(l=>{
    const key=[n.id,l.to].sort().join('~~');
    if(!seen.has(key)){
      seen.add(key);
      if(l.t==='a') ABC_LINKS.push({source:n.id,target:l.to,type:'abc'});
      else BASE_LINKS.push({source:n.id,target:l.to,type:l.t==='cons'?'consortium':l.t==='c'?'coordinates':'knows'});
    }
  });
});

// ── PANEL ────────────────────────────────────────────────────
function closePanel(){ document.getElementById('panel').classList.remove('open'); }

function openPanel(id){
  const d = NODES.find(n=>n.id===id); if(!d) return;
  document.getElementById('panel').classList.add('open');
  const tc = TC[d.type]||'#fff';
  document.getElementById('ptype').style.color = tc;
  document.getElementById('ptype').textContent =
    d.type==='abc'?'ABC · AREA-BASED COORDINATION':
    d.type==='nngo'?'CSO / NNGO':
    d.type==='cluster'?'CLUSTER':d.type.toUpperCase();
  document.getElementById('pname').textContent = d.name;
  const pill = document.getElementById('pspill');
  if(d.type==='abc'){
    pill.textContent='Geographic node';
    pill.style.cssText='background:rgba(201,168,76,0.1);color:#C9A84C;border:1px solid rgba(201,168,76,0.22)';
  } else {
    const c=sc(d.score);
    pill.textContent=d.score;
    pill.style.cssText=`background:${c}18;color:${c};border:1px solid ${c}33`;
  }
  let html='';
  if(d.sectors&&d.sectors.length){
    html+=`<div class="psec"><div class="psec-lbl">// sectors</div><div class="pmoons">${d.sectors.map(s=>{const c=SECTOR_COLOR[s]||'#888';return`<div class="pmoon-item"><div class="pmoon-dot" style="background:${c}"></div><span class="pmoon-lbl">${s}</span></div>`;}).join('')}</div></div>`;
  }
  html+=`<div class="psec"><div class="psec-lbl">// zones of activity</div><div class="pzones">${(d.zones||[]).map(z=>`<div class="pzrow"><div class="pzdot"></div><span class="pzlbl">${z}</span></div>`).join('')}</div></div>`;
  if(d.contacts&&d.contacts.length){
    html+=`<div class="psec"><div class="psec-lbl">// contacts</div><div class="pcontacts">${d.contacts.map(c=>`<div class="pcontact"><div class="pcontact-name">${c.name}</div><div class="pcontact-role">${c.role}</div><div class="pcontact-email">${c.email}</div></div>`).join('')}</div></div>`;
  }
  if(d.type!=='abc'){
    const cl=(d.links||[]).filter(l=>l.t!=='a').slice(0,5).map(l=>({n:NODES.find(x=>x.id===l.to),t:l.t==='cons'?'consortium':l.t==='c'?'coordinates':'knows'})).filter(x=>x.n);
    if(cl.length) html+=`<div class="psec"><div class="psec-lbl">// coordination links</div><div class="plinks">${cl.map(l=>`<div class="plrow"><div style="width:6px;height:6px;border-radius:50%;background:${TC[l.n.type]||'#fff'};flex-shrink:0"></div><span class="plname">${l.n.name}</span><span class="pltype">${l.t}</span></div>`).join('')}</div></div>`;
  } else {
    const bridges=(d.links||[]).filter(l=>l.t==='a').map(l=>NODES.find(n=>n.id===l.to)).filter(Boolean);
    if(bridges.length) html+=`<div class="psec"><div class="psec-lbl">// actors bridged</div><div class="plinks">${bridges.map(b=>`<div class="plrow"><div style="width:6px;height:6px;border-radius:50%;background:${TC[b.type]||'#fff'};flex-shrink:0"></div><span class="plname">${b.name}</span><span class="pltype">${b.type}</span></div>`).join('')}</div></div>`;
  }
  if(d.note) html+=`<div class="psec"><div class="psec-lbl">// field note</div><div class="pnote">${d.note}</div></div>`;
  document.getElementById('pbody').innerHTML=html;
}

// ── TOUR NAV ─────────────────────────────────────────────────
function goToStep(i){
  currentStep = Math.max(0, Math.min(STEPS.length-1, i));
  updateTourUI();
  applyStep();
}
function nextStep(){ goToStep(currentStep+1); }
function prevStep(){ goToStep(currentStep-1); }

function updateTourUI(){
  const step = STEPS[currentStep];
  document.getElementById('tour-label').textContent = step.label;
  document.getElementById('tour-text').textContent = step.text;
  document.getElementById('tour-counter').textContent = `${currentStep+1} / ${STEPS.length}`;

  // Dots
  const dotsEl = document.getElementById('tour-dots');
  dotsEl.innerHTML = '';
  STEPS.forEach((_,i)=>{
    const d = document.createElement('div');
    d.className = 'tour-step-dot' + (i===currentStep?' active':i<currentStep?' done':'');
    d.onclick = ()=>goToStep(i);
    dotsEl.appendChild(d);
  });

  // Buttons
  document.getElementById('btn-prev').style.opacity = currentStep===0?'0.3':'1';
  document.getElementById('btn-prev').style.pointerEvents = currentStep===0?'none':'auto';
  const nextBtn = document.getElementById('btn-next');
  if(currentStep===STEPS.length-1){
    nextBtn.textContent='Explore freely';
    nextBtn.className='tour-btn done-btn';
    nextBtn.onclick=()=>{ closePanel(); applyStep(); };
  } else {
    nextBtn.textContent='Next →';
    nextBtn.className='tour-btn primary';
    nextBtn.onclick=nextStep;
  }
}

// ── APPLY STEP ───────────────────────────────────────────────
function applyStep(){
  const step = STEPS[currentStep];
  const showABC = step.showABC;
  const highlightIds = step.highlight ? new Set(step.highlight) : null;

  // ABC links visibility
  d3.selectAll('.abc-link')
    .transition().duration(500)
    .style('opacity', showABC ? 0.55 : 0);

  d3.selectAll('.abc-node')
    .transition().duration(500)
    .style('opacity', showABC ? 1 : 0);

  // Nodes
  d3.selectAll('.node-g').each(function(d){
    const isABC = d.abc;
    if(isABC){ return; } // handled above
    let opacity;
    if(!step.dimAll || !highlightIds){
      opacity = 1;
    } else {
      opacity = highlightIds.has(d.id) ? 1 : 0.12;
    }
    d3.select(this).transition().duration(400).style('opacity', opacity);
  });

  // Links
  d3.selectAll('.base-link').each(function(d){
    let opacity;
    if(!step.dimAll || !highlightIds){
      opacity = d.type==='consortium'?0.6:d.type==='coordinates'?0.14:0.07;
    } else {
      // Show only links between highlighted nodes AND of the right type
      const srcId = typeof d.source==='string'?d.source:d.source.id;
      const tgtId = typeof d.target==='string'?d.target:d.target.id;
      const srcHL = highlightIds.has(srcId);
      const tgtHL = highlightIds.has(tgtId);
      const bothHL = srcHL && tgtHL;
      // For step 3 (cluster): only show links FROM cl_nut
      if(step.highlightSource){
        const isFromSource = srcId===step.highlightSource || tgtId===step.highlightSource;
        opacity = (bothHL && isFromSource) ? (d.type==='consortium'?0.7:0.5) : 0.04;
      } else if(step.highlightLinks){
        opacity = (bothHL && step.highlightLinks.includes(d.type)) ? 0.8 : 0.04;
      } else {
        opacity = bothHL ? 0.5 : 0.04;
      }
    }
    d3.select(this).transition().duration(400).style('opacity', opacity);
  });

  // Open panel
  if(step.openPanel){
    setTimeout(()=>openPanel(step.openPanel), 500);
  } else {
    closePanel();
  }
}

// ── GEOMETRY ─────────────────────────────────────────────────
function nodeR(d){
  if(d.type==='abc') return 0;
  if(d.type==='cluster') return 20;
  if(d.id==='ocha') return 18;
  if(d.type==='un') return 15;
  if(d.score>=83) return 14;
  if(d.score>=70) return 12;
  return 11;
}

function moonPositions(sectors, r){
  const n=sectors.length; if(!n) return [];
  const orbitR=r+11;
  return sectors.map((s,i)=>{
    const frac=n===1?0.5:i/(n-1);
    const angle=(frac*Math.PI*1.6)-Math.PI*0.8-Math.PI/2;
    return { x:orbitR*Math.cos(angle), y:orbitR*Math.sin(angle), r:3.5, color:SECTOR_COLOR[s]||'#888' };
  });
}

function placeNodes(W, H){
  const PAD=44;
  function bounds(z){
    return { x0:z.x0*W+PAD, y0:z.y0*H+PAD, x1:z.x1*W-PAD, y1:z.y1*H-PAD };
  }
  const groups={government:[],un:[],donor:[],ingo:[],nngo:[],cluster:[]};
  NODES.filter(n=>!n.abc).forEach(n=>{ if(groups[n.type]) groups[n.type].push(n); });

  Object.entries(groups).forEach(([key,nodes])=>{
    if(!nodes.length) return;
    const b=bounds(ZONES[key]||ZONES.cluster);
    const zW=b.x1-b.x0, zH=b.y1-b.y0;
    const cols=Math.max(1,Math.ceil(Math.sqrt(nodes.length*(zW/Math.max(zH,1)))));
    const rows=Math.ceil(nodes.length/cols);
    nodes.forEach((n,i)=>{
      n.x=b.x0+(zW/cols)*((i%cols)+0.5);
      n.y=b.y0+(zH/rows)*(Math.floor(i/cols)+0.5);
    });
  });

  const abcPos=[{x:W*0.16,y:H*0.52},{x:W*0.38,y:H*0.80},{x:W*0.62,y:H*0.80},{x:W*0.84,y:H*0.52}];
  NODES.filter(n=>n.abc).forEach((n,i)=>{ const p=abcPos[i]||{x:W/2,y:H/2}; n.x=p.x; n.y=p.y; });
}

    .attr('x1',d=>nodeById.get(d.source)?.x||0).attr('y1',d=>nodeById.get(d.source)?.y||0)
    .attr('x2',d=>nodeById.get(d.target)?.x||0).attr('y2',d=>nodeById.get(d.target)?.y||0)

  // Type sublabel
  nSel.filter(d=>d.type!=='cluster').append('text')
    .attr('text-anchor','middle').attr('y',d=>nodeR(d)+13)
    .attr('font-size',7).attr('font-family','IBM Plex Mono, monospace')
    .attr('fill',d=>TC[d.type]||'#fff').attr('opacity',0.5).attr('pointer-events','none')
    .text(d=>d.type==='nngo'?'CSO/NNGO':d.type.toUpperCase());

  // Score badge
  nSel.filter(d=>d.type!=='cluster').append('circle')
    .attr('cx',d=>nodeR(d)*0.72).attr('cy',d=>-nodeR(d)*0.72).attr('r',7.5)
    .attr('fill',d=>sc(d.score)).attr('stroke','#080c11').attr('stroke-width',1.5).attr('pointer-events','none');
  nSel.filter(d=>d.type!=='cluster').append('text')
    .attr('x',d=>nodeR(d)*0.72).attr('y',d=>-nodeR(d)*0.72)
    .attr('text-anchor','middle').attr('dominant-baseline','central')
    .attr('font-size',6.5).attr('font-weight','500').attr('font-family','IBM Plex Mono, monospace')
    .attr('fill','#fff').attr('pointer-events','none').text(d=>d.score);

  // ABC nodes
  const abcG=g.append('g');
  const abcSel=abcG.selectAll('g.abc-node').data(NODES.filter(n=>n.abc)).join('g')
    .attr('class','abc-node')
    .attr('transform',d=>`translate(${d.x},${d.y})`)
    .style('cursor','pointer')
    .style('opacity',0)
    .on('click',(e,d)=>{e.stopPropagation();openPanel(d.id);});

  abcSel.append('rect')
    .attr('width',26).attr('height',26).attr('x',-13).attr('y',-13).attr('rx',2)
    .attr('transform','rotate(45)')
    .attr('fill','rgba(201,168,76,0.09)').attr('stroke','#C9A84C').attr('stroke-width',1.5)
    .attr('filter','url(#gf_ga)');
  abcSel.append('rect')
    .attr('width',40).attr('height',40).attr('x',-20).attr('y',-20).attr('rx',2)
    .attr('transform','rotate(45)').attr('fill','none')
    .attr('stroke','rgba(201,168,76,0.15)').attr('stroke-width',1).attr('pointer-events','none');
  abcSel.append('text')
    .attr('text-anchor','middle').attr('dominant-baseline','central').attr('y',-1)
    .attr('font-size',8).attr('font-family','Inter, sans-serif')
    .attr('fill','#C9A84C').attr('pointer-events','none')
    .text(d=>d.name);

  // Fade in
  nSel.style('opacity',0).transition().delay((_,i)=>i*14).duration(350).style('opacity',1);

  // Apply initial step after render
  setTimeout(()=>applyStep(), 400);
}

// ── INIT ────────────────────────────────────────────────────
updateTourUI();
render();
window.addEventListener('resize',()=>render());
</script>
</body>
</html>
