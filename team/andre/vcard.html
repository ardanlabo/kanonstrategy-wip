
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>André R. Eylettens — Kanon Strategy</title>

<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Serif:wght@300;400&family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0D1117;
    --gold: #C9A84C;
    --gold-dim: rgba(201,168,76,0.18);
    --gold-border: rgba(201,168,76,0.35);
    --white: #ffffff;
    --white-dim: rgba(255,255,255,0.55);
    --white-faint: rgba(255,255,255,0.18);
    --white-ghost: rgba(255,255,255,0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: #060A0F;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'IBM Plex Mono', monospace;
    color: var(--white);
    overflow-x: hidden;
  }

  /* Subtle radial bg */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse 80% 60% at 50% 30%, rgba(201,168,76,0.06) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .shell {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 420px;
    padding: 32px 20px 48px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }

  /* ── CARD ── */
  .card {
    width: 100%;
    background: var(--navy);
    border: 1px solid var(--gold-border);
    border-radius: 3px;
    padding: 44px 36px 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
    overflow: hidden;
    animation: cardIn 0.9s cubic-bezier(0.22, 1, 0.36, 1) both;
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(24px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0)   scale(1); }
  }

  /* Ghost watermark */
  .card-wm {
    position: absolute;
    top: -40px;
    right: -40px;
    opacity: 0.07;
    pointer-events: none;
  }

  /* ── LOGO MARK ── */
  .mark-wrap {
    margin-bottom: 18px;
    animation: fadeUp 1s 0.1s cubic-bezier(0.22,1,0.36,1) both;
  }

  /* ── WORDMARK ── */
  .wordmark {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    margin-bottom: 32px;
    animation: fadeUp 1s 0.18s cubic-bezier(0.22,1,0.36,1) both;
  }
  .wm-kanon {
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-weight: 300;
    font-size: 17px;
    letter-spacing: 0.34em;
    color: var(--white);
  }
  .wm-strategy {
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-weight: 400;
    font-size: 6.5px;
    letter-spacing: 0.52em;
    text-transform: uppercase;
    color: rgba(74, 80, 96, 1);
  }

  /* ── NAME & TITLE ── */
  .card-name {
    font-family: 'IBM Plex Serif', serif;
    font-weight: 300;
    font-size: 22px;
    letter-spacing: 0.01em;
    color: var(--white);
    text-align: center;
    margin-bottom: 8px;
    animation: fadeUp 1s 0.26s cubic-bezier(0.22,1,0.36,1) both;
  }
  .card-title {
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-weight: 300;
    font-size: 8px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--gold);
    text-align: center;
    animation: fadeUp 1s 0.32s cubic-bezier(0.22,1,0.36,1) both;
  }

  /* ── DIVIDER ── */
  .divider {
    width: 40px;
    height: 1px;
    background: var(--gold-border);
    margin: 28px 0 26px;
    animation: fadeUp 1s 0.38s cubic-bezier(0.22,1,0.36,1) both;
  }

  /* ── CONTACT LINES ── */
  .contact-block {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 10px;
    animation: fadeUp 1s 0.44s cubic-bezier(0.22,1,0.36,1) both;
  }
  .contact-row {
    display: flex;
    align-items: center;
    gap: 12px;
    text-decoration: none;
  }
  .contact-icon {
    width: 28px;
    height: 28px;
    border: 1px solid var(--gold-border);
    border-radius: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: border-color 0.2s, background 0.2s;
  }
  .contact-row:hover .contact-icon {
    border-color: var(--gold);
    background: var(--gold-dim);
  }
  .contact-icon svg { display: block; }
  .contact-text {
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 300;
    font-size: 12px;
    letter-spacing: 0.02em;
  }
  .contact-primary .contact-text { color: rgba(255,255,255,0.72); }
  .contact-secondary .contact-text { color: rgba(255,255,255,0.38); }
  .contact-wa .contact-text { color: rgba(255,255,255,0.72); }

  .contact-row:hover .contact-text { color: var(--white); }

  /* ── QR SECTION ── */
  .qr-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    margin-top: 32px;
    padding-top: 28px;
    border-top: 1px solid rgba(201,168,76,0.12);
    width: 100%;
    animation: fadeUp 1s 0.54s cubic-bezier(0.22,1,0.36,1) both;
  }
  .qr-label {
    font-size: 7px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--white-faint);
  }
  .qr-frame {
    padding: 8px;
    background: #0D1117;
    border: 1px solid var(--gold-border);
    border-radius: 2px;
  }
  .qr-frame img {
    display: block;
    image-rendering: pixelated;
  }
  .qr-hint {
    font-size: 7px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--white-faint);
    text-align: center;
  }

  /* ── CTA BUTTON ── */
  .cta-wrap {
    width: 100%;
    max-width: 420px;
    padding: 0 20px;
    margin-top: 20px;
    animation: fadeUp 1s 0.62s cubic-bezier(0.22,1,0.36,1) both;
  }
  .cta-btn {
    display: block;
    width: 100%;
    padding: 15px 0;
    background: var(--gold);
    color: #060A0F;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-weight: 400;
    font-size: 8.5px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    text-decoration: none;
    text-align: center;
    border-radius: 2px;
    transition: background 0.2s, letter-spacing 0.2s;
  }
  .cta-btn:hover {
    background: #DDB95A;
    letter-spacing: 0.32em;
  }

  /* ── FOOTER ── */
  .footer {
    margin-top: 32px;
    font-size: 7px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.12);
    animation: fadeUp 1s 0.7s cubic-bezier(0.22,1,0.36,1) both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
