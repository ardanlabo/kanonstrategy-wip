<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Last Mile Risk Index — Kanon Strategy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Serif:ital,wght@0,300;0,400;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root{
  --void:#0D1117;--navy:#0F2952;--gold:#C9A84C;--gold-d:#A8863A;
  --ink:#1A1C1E;--muted:#6B7280;--rule:#C4C7CE;
  --critical:#C0392B;--high:#E67E22;--green:#22c55e;
  --serif:'IBM Plex Serif',Georgia,serif;
  --sans:'Inter',system-ui,sans-serif;
  --mono:'IBM Plex Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{font-family:var(--sans);background:var(--void);color:#fff;-webkit-font-smoothing:antialiased;display:flex;flex-direction:column;}

.topbar{height:48px;flex-shrink:0;background:#0a0e15;border-bottom:0.5px solid rgba(201,168,76,0.15);display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:1001;}
.tl{display:flex;align-items:center;gap:14px;}
.t-logo{display:flex;align-items:center;gap:10px;}
.t-sep{width:1px;height:16px;background:rgba(201,168,76,0.25);}
.t-brand{font-family:var(--mono);font-size:11px;font-weight:500;letter-spacing:0.18em;color:rgba(255,255,255,0.85);}
.t-div{width:0.5px;height:20px;background:rgba(255,255,255,0.08);}
.t-product{font-family:var(--serif);font-weight:300;font-size:13px;color:rgba(255,255,255,0.55);}
.t-ctx{font-family:var(--mono);font-size:9px;color:rgba(255,255,255,0.18);letter-spacing:0.1em;}
.t-back{font-family:var(--sans);font-size:11px;color:rgba(255,255,255,0.2);text-decoration:none;transition:color 0.2s;}
.t-back:hover{color:rgba(201,168,76,0.7);}

.region-bar{height:36px;flex-shrink:0;background:#0a0e15;border-bottom:0.5px solid rgba(255,255,255,0.06);display:flex;align-items:center;padding:0 20px;gap:6px;overflow-x:auto;}
.region-bar::-webkit-scrollbar{display:none;}
.rb-label{font-family:var(--mono);font-size:8px;letter-spacing:0.12em;color:rgba(255,255,255,0.18);text-transform:uppercase;margin-right:4px;white-space:nowrap;flex-shrink:0;}
.rb-btn{font-family:var(--mono);font-size:9px;letter-spacing:0.08em;padding:3px 10px;border:0.5px solid rgba(255,255,255,0.1);color:rgba(255,255,255,0.28);background:transparent;cursor:pointer;transition:all 0.15s;white-space:nowrap;flex-shrink:0;}
.rb-btn:hover{border-color:rgba(255,255,255,0.3);color:rgba(255,255,255,0.65);}
.rb-btn.active{border-color:var(--gold);color:var(--gold);background:rgba(201,168,76,0.08);}
.rb-sep{width:1px;height:16px;background:rgba(255,255,255,0.06);flex-shrink:0;margin:0 4px;}

.body-wrap{flex:1;display:flex;overflow:hidden;position:relative;}
#map{flex:1;z-index:1;}

/* SIDEBAR */
.sidebar{width:300px;flex-shrink:0;background:#0a0e15;border-left:0.5px solid rgba(255,255,255,0.07);display:flex;flex-direction:column;overflow:hidden;z-index:1000;}
.sb-top{padding:12px 14px;border-bottom:0.5px solid rgba(255,255,255,0.06);}
.sb-label{font-family:var(--mono);font-size:8px;letter-spacing:0.12em;color:rgba(201,168,76,0.4);text-transform:uppercase;margin-bottom:8px;}
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:rgba(255,255,255,0.05);}
.kpi-cell{background:#0a0e15;padding:9px 11px;}
.kpi-num{font-family:var(--mono);font-size:20px;font-weight:500;line-height:1;margin-bottom:2px;}
.kpi-lbl{font-family:var(--sans);font-size:9px;color:rgba(255,255,255,0.25);line-height:1.3;}

.wl-header{padding:7px 14px;font-family:var(--mono);font-size:8px;letter-spacing:0.1em;color:rgba(255,255,255,0.2);text-transform:uppercase;background:#080c12;border-bottom:0.5px solid rgba(255,255,255,0.05);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;}
.wl-count{color:rgba(201,168,76,0.5);}
.woreda-list{flex:1;overflow-y:auto;}
.woreda-list::-webkit-scrollbar{width:3px;}
.woreda-list::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);}
.wl-item{padding:9px 14px;border-bottom:0.5px solid rgba(255,255,255,0.05);cursor:pointer;transition:background 0.12s;display:flex;align-items:center;gap:9px;}
.wl-item:hover{background:rgba(255,255,255,0.03);}
.wl-item.selected{background:rgba(201,168,76,0.06);border-left:2px solid var(--gold);}
.wl-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.wl-info{flex:1;min-width:0;}
.wl-name{font-family:var(--sans);font-size:11px;font-weight:500;color:rgba(255,255,255,0.8);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.wl-sub{font-family:var(--mono);font-size:8px;color:rgba(255,255,255,0.22);margin-top:1px;}
.wl-score{font-family:var(--mono);font-size:11px;font-weight:500;flex-shrink:0;}

/* DETAIL PANEL */
.detail-panel{position:absolute;bottom:48px;left:0;right:300px;background:#0c111a;border-top:2px solid var(--gold);transform:translateY(100%);transition:transform 0.25s ease;z-index:999;max-height:50%;box-shadow:0 -4px 20px rgba(0,0,0,0.5);display:flex;flex-direction:column;}
.detail-panel.open{transform:translateY(0);}
.dp-header{padding:10px 18px;border-bottom:0.5px solid rgba(255,255,255,0.07);display:flex;justify-content:space-between;align-items:flex-start;flex-shrink:0;}
.dp-title{font-family:var(--serif);font-weight:300;font-size:15px;color:#fff;}
.dp-meta{font-family:var(--mono);font-size:9px;color:rgba(255,255,255,0.25);margin-top:2px;}
.dp-close{font-size:14px;color:rgba(255,255,255,0.2);cursor:pointer;padding:2px 6px;margin-left:12px;}
.dp-close:hover{color:#fff;}
.dp-body{overflow-y:auto;flex:1;display:grid;grid-template-columns:200px 1fr 1fr;gap:0;}
.dp-col{padding:14px 16px;border-right:0.5px solid rgba(255,255,255,0.05);}
.dp-col:last-child{border-right:none;}
.dp-col-lbl{font-family:var(--mono);font-size:8px;letter-spacing:0.1em;color:rgba(201,168,76,0.4);text-transform:uppercase;margin-bottom:10px;}

/* LMRI score display */
.dp-score-big{font-family:var(--mono);font-size:36px;font-weight:500;line-height:1;margin-bottom:4px;}
.dp-score-risk{font-family:var(--mono);font-size:9px;letter-spacing:0.1em;margin-bottom:12px;}
.dp-metric{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:0.5px solid rgba(255,255,255,0.05);}
.dp-metric:last-child{border-bottom:none;}
.dp-metric-lbl{font-family:var(--mono);font-size:9px;color:rgba(255,255,255,0.3);}
.dp-metric-val{font-family:var(--mono);font-size:11px;color:rgba(255,255,255,0.7);}

/* Facility list */
.fac-item{padding:7px 0;border-bottom:0.5px solid rgba(255,255,255,0.05);display:flex;align-items:flex-start;gap:8px;}
.fac-item:last-child{border-bottom:none;}
.fac-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:3px;}
.fac-name{font-family:var(--sans);font-size:11px;color:rgba(255,255,255,0.7);flex:1;min-width:0;}
.fac-days{font-family:var(--mono);font-size:9px;flex-shrink:0;}
.fac-tag{font-family:var(--mono);font-size:8px;padding:1px 5px;margin-left:4px;}

/* Chain */
.chain-node{display:flex;align-items:flex-start;gap:8px;padding:7px 0;border-bottom:0.5px solid rgba(255,255,255,0.05);}
.chain-node:last-child{border-bottom:none;}
.chain-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:3px;}
.chain-org{font-family:var(--sans);font-size:11px;color:rgba(255,255,255,0.7);}
.chain-role{font-family:var(--mono);font-size:8px;color:rgba(255,255,255,0.25);margin-top:1px;}
.chain-arrow{font-family:var(--mono);font-size:8px;color:rgba(255,255,255,0.12);padding:2px 10px 2px 14px;}

/* Action box */
.action-box{margin:10px 0 0;background:rgba(201,168,76,0.04);border:0.5px solid rgba(201,168,76,0.15);border-left:2px solid var(--gold);padding:9px 12px;}
.action-lbl{font-family:var(--mono);font-size:8px;letter-spacing:0.1em;color:rgba(201,168,76,0.6);text-transform:uppercase;margin-bottom:4px;}
.action-txt{font-family:var(--sans);font-size:11px;font-weight:300;color:rgba(255,255,255,0.6);line-height:1.6;}

/* TOUR */
.tour-bar{position:absolute;bottom:0;left:0;right:300px;background:rgba(10,14,21,0.97);border-top:0.5px solid rgba(255,255,255,0.07);padding:8px 18px;display:flex;align-items:center;justify-content:space-between;z-index:998;height:48px;}
.tdots{display:flex;gap:5px;}
.tdot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.12);cursor:pointer;transition:all 0.2s;}
.tdot.active{background:var(--gold);}
.tdot.done{background:rgba(201,168,76,0.35);}
.t-ctr{font-family:var(--mono);font-size:9px;color:rgba(255,255,255,0.18);}
.tour-msg{flex:1;padding:0 14px;}
.t-lbl{font-family:var(--mono);font-size:9px;color:rgba(201,168,76,0.6);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:1px;}
.t-txt{font-family:var(--sans);font-size:11px;font-weight:300;color:rgba(255,255,255,0.5);}
.tour-btns{display:flex;gap:7px;flex-shrink:0;}
.tbtn{font-family:var(--mono);font-size:10px;letter-spacing:0.07em;padding:4px 12px;cursor:pointer;transition:all 0.2s;border:0.5px solid rgba(255,255,255,0.1);background:transparent;color:rgba(255,255,255,0.3);}
.tbtn.primary{border-color:rgba(201,168,76,0.4);color:var(--gold);background:rgba(201,168,76,0.05);}
.tbtn.done{border-color:rgba(34,197,94,0.4);color:#22c55e;}

/* Map legend */
.map-legend{position:absolute;bottom:60px;left:12px;background:rgba(255,255,255,0.96);border:1px solid #ddd;padding:10px 12px;z-index:999;box-shadow:0 2px 8px rgba(0,0,0,0.15);pointer-events:none;}
.ml-title{font-family:var(--mono);font-size:8px;color:#555;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:7px;}
.ml-row{display:flex;align-items:center;gap:7px;margin-bottom:5px;}
.ml-swatch{width:16px;height:12px;border:0.5px solid rgba(0,0,0,0.15);}
.ml-lbl{font-family:var(--mono);font-size:9px;color:#444;}

/* Popup */
.leaflet-popup-content-wrapper{background:#0c111a;border:0.5px solid rgba(201,168,76,0.25);border-radius:0;box-shadow:0 4px 16px rgba(0,0,0,0.4);}
.leaflet-popup-tip{background:#0c111a;}
.leaflet-popup-content{color:#fff;font-family:'Inter',sans-serif;font-size:12px;margin:10px 14px;}
.lp-name{font-family:'IBM Plex Serif',serif;font-size:14px;font-weight:300;margin-bottom:3px;}
.lp-sub{font-family:'IBM Plex Mono',monospace;font-size:8px;color:rgba(255,255,255,0.3);margin-bottom:7px;letter-spacing:0.08em;}
.lp-score{font-family:'IBM Plex Mono',monospace;font-size:22px;font-weight:500;}
.lp-risk{font-family:'IBM Plex Mono',monospace;font-size:9px;margin-top:2px;letter-spacing:0.08em;}
.lp-hint{font-family:'Inter',sans-serif;font-size:10px;color:rgba(255,255,255,0.3);margin-top:7px;}
</style>
</head>
<body>

<div class="topbar">

<div class="region-bar">

<div class="body-wrap">

  <div class="map-legend">

    <div class="ml-row"><div class="ml-swatch" style="background:rgba(230,126,34,0.75)"></div><span class="ml-lbl">High 0.50–0.74</span></div>
    <div class="ml-row"><div class="ml-swatch" style="background:rgba(180,180,180,0.25)"></div><span class="ml-lbl">Below threshold</span></div>
  </div>

  <div class="sidebar">
    <div class="sb-top">
      <div class="sb-label">// LMRI &gt; 0.5 · Real data</div>
      <div class="kpi-grid">
        <div class="kpi-cell"><div class="kpi-num" id="k-total" style="color:var(--gold)">—</div><div class="kpi-lbl">Woredas at risk</div></div>
        <div class="kpi-cell"><div class="kpi-num" id="k-crit" style="color:var(--critical)">—</div><div class="kpi-lbl">Critical ≥ 0.75</div></div>
        <div class="kpi-cell"><div class="kpi-num" id="k-nongo" style="color:#ef4444">—</div><div class="kpi-lbl">No NGO support</div></div>
        <div class="kpi-cell"><div class="kpi-num" id="k-fac" style="color:rgba(255,255,255,0.55)">—</div><div class="kpi-lbl">Facilities uncovered</div></div>
      </div>
    </div>
    <div class="wl-header">
      <span>Woredas at risk</span>
      <span class="wl-count" id="wl-count">—</span>
    </div>
    <div class="woreda-list" id="woreda-list"></div>
  </div>

  <div class="detail-panel" id="detail-panel">
    <div class="dp-header">
      <div>
        <div class="dp-title" id="dp-title">—</div>
        <div class="dp-meta" id="dp-meta">—</div>
      </div>
      <div class="dp-close" onclick="closeDetail()">✕</div>
    </div>
    <div class="dp-body" id="dp-body"></div>
  </div>

  <div class="tour-bar">
    <div style="display:flex;align-items:center;gap:10px;flex-shrink:0">
      <div class="tdots" id="tdots"></div>
      <div class="t-ctr" id="t-ctr">1 / 5</div>
    </div>
    <div class="tour-msg">
      <div class="t-lbl" id="t-lbl"></div>
      <div class="t-txt" id="t-txt"></div>
    </div>
    <div class="tour-btns">
      <button class="tbtn" id="btn-prev" onclick="prevStep()">← Prev</button>
      <button class="tbtn primary" id="btn-next" onclick="nextStep()">Next →</button>
    </div>
  </div>
</div>

  style: f => {
    const w = LMRI_DATA.find(d => d.pcode === f.properties.pcode);
    if(!w) return {fillColor:'rgba(180,180,180,0.2)',color:'rgba(255,255,255,0.15)',weight:0.8,fillOpacity:1};
    const c = w.risk==='critical' ? 'rgba(192,57,43,0.75)' : 'rgba(230,126,34,0.65)';
    const sc = w.risk==='critical' ? '#C0392B' : '#E67E22';
    return {fillColor:c,color:sc,weight:1.5,fillOpacity:1};
  },
  onEachFeature: (f, layer) => {
    const w = LMRI_DATA.find(d => d.pcode === f.properties.pcode);
    if(!w) return;
    const color = w.risk==='critical' ? '#C0392B' : '#E67E22';
    layer.bindPopup(`
      <div class="lp-name">${w.woreda}</div>
      <div class="lp-sub">${w.zone} · ${w.region}</div>
      <div class="lp-score" style="color:${color}">${w.lmri.toFixed(2)}</div>
      <div class="lp-risk" style="color:${color}">${w.risk==='critical'?'CRITICAL':'HIGH RISK'}</div>
      <div class="lp-hint">${w.facilities} facilities · ${w.hr} health workers · click to analyse</div>
    `);
    layer.on('click', ()=>selectWoreda(w));
    layer.on('mouseover', ()=>layer.setStyle({weight:2.5,fillOpacity:0.9}));
    layer.on('mouseout', ()=>{
      const isSel = selectedWoreda && selectedWoreda.pcode===w.pcode;
      layer.setStyle({weight:isSel?2.5:1.5,fillOpacity:isSel?0.95:w.risk==='critical'?0.75:0.65});
    });
    woredaLayers[w.pcode] = layer;
  }
}).addTo(map);

// ── STATE ─────────────────────────────────────────────────────
let selectedWoreda = null;
let activeRegion = 'all';
let step = 0;

// ── REGION FILTER ─────────────────────────────────────────────
document.querySelectorAll('.rb-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.rb-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    activeRegion = btn.dataset.region;
    if(activeRegion==='all') map.setView([8.5,39.5],6,{animate:true});
    else { const b=REGION_BOUNDS[activeRegion]; if(b) map.fitBounds(b,{padding:[40,40],animate:true}); }
    renderList();
    updateKPIs();
  });
});

function getFiltered(){
  return activeRegion==='all' ? LMRI_DATA : LMRI_DATA.filter(w=>w.region===activeRegion);
}

function updateKPIs(){
  const d = getFiltered();
  document.getElementById('k-total').textContent = d.length;
  document.getElementById('k-crit').textContent = d.filter(w=>w.risk==='critical').length;
  document.getElementById('k-nongo').textContent = d.filter(w=>!w.has_support).length;
  document.getElementById('k-fac').textContent = d.reduce((s,w)=>s+w.facilities,0);
}

function renderList(){
  const data = getFiltered().slice().sort((a,b)=>b.lmri-a.lmri);
  document.getElementById('wl-count').textContent = data.length;
  document.getElementById('woreda-list').innerHTML = data.map(w=>{
    const c = w.risk==='critical'?'#C0392B':'#E67E22';
    const isSel = selectedWoreda && selectedWoreda.pcode===w.pcode;
    return `<div class="wl-item${isSel?' selected':''}" onclick="selectWoreda(LMRI_DATA.find(x=>x.pcode==='${w.pcode}'))">
      <div class="wl-dot" style="background:${c}"></div>
      <div class="wl-info">
        <div class="wl-name">${w.woreda}</div>
        <div class="wl-sub">${w.region} · ${w.facilities} facilities</div>
      </div>
      <div class="wl-score" style="color:${c}">${w.lmri.toFixed(2)}</div>
    </div>`;
  }).join('');
}

// ── SELECT WOREDA ─────────────────────────────────────────────
function selectWoreda(w){
  if(!w) return;
  selectedWoreda = w;
  renderList();
  const layer = woredaLayers[w.pcode];
  if(layer){
    const bounds = layer.getBounds();
    map.fitBounds(bounds,{padding:[60,60],maxZoom:11,animate:true});
    layer.setStyle({weight:2.5,fillOpacity:0.95});
    layer.openPopup();
  }
  openDetail(w);
}

// ── DETAIL PANEL ─────────────────────────────────────────────
function openDetail(w){
  const reg = REGIONAL[w.region]||{boh:'—',capital:'—',ngo:'—',contact:'—',role:'—'};
  const color = w.risk==='critical'?'#C0392B':'#E67E22';
  const ngoColor = NGO_COLOR[reg.ngo]||'#5B8DB8';

  document.getElementById('dp-title').textContent = w.woreda;
  document.getElementById('dp-meta').textContent = w.zone+' · '+w.region+' · pcode: '+w.pcode;
  document.getElementById('detail-panel').classList.add('open');

  // LMRI explanation
  const lmriExplain = `LMRI = proportion of OTP-active facilities with RUTF stockout > 30 days during T2 (Oct–Mar 2025/26). Score 0–1. Threshold: 0.5.`;
  const delta = w.delta !== null ? (w.delta > 0 ? '+'+w.delta.toFixed(2)+' vs T1 (worsening)' : w.delta.toFixed(2)+' vs T1 (improving)') : 'No T1 comparison';

  // Facility rows
  const facs = w.facilities_detail || [];
  const facRows = facs.length > 0 ? facs.map(f=>{
    const days = parseFloat(f.lmri_t2)||0;
    const isCrit = f.critical==='1.0'||f.critical===1;
    const fc = isCrit?'#C0392B':'rgba(255,255,255,0.4)';
    const noSupply = f.supply_t2==='0.0'||f.supply_t2===0;
    return `<div class="fac-item">
      <div class="fac-dot" style="background:${fc}"></div>
      <div>
        <div class="fac-name">${f.name}${noSupply?'<span class="fac-tag" style="background:rgba(192,57,43,0.15);color:#C0392B">No RUTF</span>':''}</div>
        <div style="display:flex;gap:12px;margin-top:3px">
          <span style="font-family:var(--mono);font-size:9px;color:${fc}">${days>0?days+' days stockout':'No stockout'}</span>
          ${f.admitted_t2?'<span style="font-family:var(--mono);font-size:9px;color:rgba(255,255,255,0.25)">'+f.admitted_t2+' admissions</span>':''}
        </div>
      </div>
    </div>`;
  }).join('') : '<div style="font-family:var(--sans);font-size:11px;color:rgba(255,255,255,0.25);padding:8px 0">No facility detail available</div>';

  // Response chain
  const firstContact = w.has_support
    ? `Contact ${reg.contact} (${reg.ngo}) first — present in territory. Then coordinate with ${reg.boh} at ${reg.capital} BoH.`
    : `No NGO present. Contact ${reg.boh} (${reg.capital} BoH) directly. Escalate to UNICEF Addis if no response in 48h.`;

  document.getElementById('dp-body').innerHTML = `
    <div class="dp-col">
      <div class="dp-col-lbl">// LMRI score</div>
      <div class="dp-score-big" style="color:${color}">${w.lmri.toFixed(2)}</div>
      <div class="dp-score-risk" style="color:${color}">${w.risk==='critical'?'CRITICAL':'HIGH RISK'}</div>
      <div class="dp-metric"><span class="dp-metric-lbl">Facilities at risk</span><span class="dp-metric-val">${w.facilities}</span></div>
      <div class="dp-metric"><span class="dp-metric-lbl">HW unreached</span><span class="dp-metric-val">${w.hr}</span></div>
      <div class="dp-metric"><span class="dp-metric-lbl">NGO coverage</span><span class="dp-metric-val" style="color:${w.has_support?'#22c55e':'#ef4444'}">${w.has_support?w.fac_support+' facilities':'None'}</span></div>
      <div class="dp-metric"><span class="dp-metric-lbl">T1→T2 trend</span><span class="dp-metric-val" style="font-size:9px;color:${w.delta>0?'#ef4444':w.delta<0?'#22c55e':'rgba(255,255,255,0.4)'}">${delta}</span></div>
      ${w.low_n?'<div style="margin-top:10px;font-family:var(--mono);font-size:8px;color:rgba(245,158,11,0.7);padding:5px 8px;border:0.5px solid rgba(245,158,11,0.2);background:rgba(245,158,11,0.05)">⚠ Low N flag — interpret with caution</div>':''}
      <div style="margin-top:12px;font-family:var(--sans);font-size:10px;color:rgba(255,255,255,0.2);line-height:1.5">${lmriExplain}</div>
    </div>

    <div class="dp-col">
      <div class="dp-col-lbl">// Health facilities (${facs.length} OTP-active)</div>
      ${facRows}
    </div>

    <div class="dp-col">
      <div class="dp-col-lbl">// Response chain</div>
      ${w.has_support?
        `<div class="chain-node" style="border-left:1.5px solid ${ngoColor}20">
          <div class="chain-dot" style="background:${ngoColor}"></div>
          <div><div class="chain-org">${reg.ngo}</div><div class="chain-role">${reg.contact} · ${reg.role}</div></div>
        </div>
        <div class="chain-arrow">↑ report to</div>`
        :
        `<div class="chain-node" style="border-left:1.5px solid rgba(192,57,43,0.3)">
          <div class="chain-dot" style="background:rgba(192,57,43,0.4);border:1px dashed #C0392B"></div>
          <div><div class="chain-org" style="color:rgba(255,255,255,0.3)">No NGO present</div><div class="chain-role" style="color:#C0392B">Coverage gap — deploy needed</div></div>
        </div>
        <div class="chain-arrow">↑ escalate directly</div>`
      }
      <div class="chain-node">
        <div class="chain-dot" style="background:#9B7FCC"></div>
        <div><div class="chain-org">${w.region} Regional BoH</div><div class="chain-role">${reg.boh} · ${reg.capital}</div></div>
      </div>
      <div class="chain-arrow">↑ escalate</div>
      <div class="chain-node">
        <div class="chain-dot" style="background:#C9A84C"></div>
        <div><div class="chain-org">UNICEF Ethiopia</div><div class="chain-role">Sarah Okonkwo · Head of Nutrition Cluster · Addis Ababa</div></div>
      </div>
      <div class="action-box">
        <div class="action-lbl">// Action this week</div>
        <div class="action-txt">${firstContact}</div>
      </div>
    </div>
  `;
}

function closeDetail(){
  document.getElementById('detail-panel').classList.remove('open');
  selectedWoreda = null;
  renderList();
}

// ── TOUR ──────────────────────────────────────────────────────
const STEPS = [
  {lbl:'01 — What is the LMRI',  txt:'The Last Mile Risk Index scores each woreda 0–1. Score = share of OTP facilities with RUTF stockout > 30 days during T2 (Oct 2025–Mar 2026). Real data — 22 woredas above threshold.'},
  {lbl:'02 — Woreda polygons',   txt:'Each coloured polygon is a real administrative unit at risk. Red = critical (≥0.75), orange = high (0.50–0.74). Click any polygon to drill down.'},
  {lbl:'03 — Region zoom',       txt:'Use the region bar to zoom in. Try Somali — 7 woredas at risk, most with zero NGO support.', region:'Somali'},
  {lbl:'04 — Facility drill-down',txt:'Click a woreda to see every OTP-active health facility, its stockout days, RUTF supply status, and admissions. This is the operational layer.', open:'Harshin'},
  {lbl:'05 — Response chain',    txt:'Each woreda profile shows the full response chain — which NGO to call, which BoH, and when to escalate to UNICEF. No NGO present = direct escalation.'},
];

function goToStep(i){
  step = Math.max(0,Math.min(STEPS.length-1,i));
  const s = STEPS[step];
  document.getElementById('t-lbl').textContent = s.lbl;
  document.getElementById('t-txt').textContent = s.txt;
  document.getElementById('t-ctr').textContent = (step+1)+' / '+STEPS.length;

  const dots = document.getElementById('tdots');
  dots.innerHTML = '';
  STEPS.forEach((_,idx)=>{
    const d = document.createElement('div');
    d.className = 'tdot'+(idx===step?' active':idx<step?' done':'');
    d.onclick = ()=>goToStep(idx);
    dots.appendChild(d);
  });

  const prev = document.getElementById('btn-prev');
  prev.style.opacity = step===0?'0.3':'1';
  prev.style.pointerEvents = step===0?'none':'auto';
  const next = document.getElementById('btn-next');
  if(step===STEPS.length-1){next.textContent='Explore freely';next.className='tbtn done';next.onclick=()=>{};}
  else{next.textContent='Next →';next.className='tbtn primary';next.onclick=nextStep;}

  if(s.region){
    document.querySelectorAll('.rb-btn').forEach(b=>b.classList.remove('active'));
    document.querySelector(`[data-region="${s.region}"]`).classList.add('active');
    activeRegion = s.region;
    const b=REGION_BOUNDS[s.region];
    if(b) map.fitBounds(b,{padding:[40,40],animate:true});
    renderList();updateKPIs();
  } else if(step===0){
    document.querySelectorAll('.rb-btn').forEach(b=>b.classList.remove('active'));
    document.querySelector('[data-region="all"]').classList.add('active');
    activeRegion='all';
    map.setView([8.5,39.5],6,{animate:true});
    renderList();updateKPIs();
  }

  if(s.open){
    setTimeout(()=>{
      const w = LMRI_DATA.find(x=>x.woreda===s.open);
      if(w) selectWoreda(w);
    },400);
  } else if(step!==4){
    closeDetail();
  }
}

function nextStep(){goToStep(step+1);}
function prevStep(){goToStep(step-1);}

// ── INIT ─────────────────────────────────────────────────────
updateKPIs();
renderList();
goToStep(0);
map.on('click',()=>closeDetail());
</script>
</body>
</html>
