<style>
:root {
  --bg: #060A0F;
  --card: #0D1117;
  --gold: #C9A84C;
  --gold-d: #A8863A;
  --gold-dim: rgba(201,168,76,0.12);
  --gold-border: rgba(201,168,76,0.28);
  --mono: 'IBM Plex Mono', monospace;
  --serif: 'IBM Plex Serif', Georgia, serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  min-height: 100vh;
  background: var(--bg);
  color: #fff;
  font-family: var(--mono);
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ── ANIMATED BACKGROUND ── */
.bg-layer {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}

.bg-rings {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 600px;
  height: 600px;
}

.bg-ring {
  position: absolute;
  border-radius: 50%;
  border: 0.5px solid rgba(201,168,76,0.06);
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  animation: ringPulse 8s ease-in-out infinite;
}
.bg-ring:nth-child(1) { width: 200px; height: 200px; animation-delay: 0s; }
.bg-ring:nth-child(2) { width: 320px; height: 320px; animation-delay: 1.2s; }
.bg-ring:nth-child(3) { width: 450px; height: 450px; animation-delay: 2.4s; }
.bg-ring:nth-child(4) { width: 590px; height: 590px; animation-delay: 3.6s; }

@keyframes ringPulse {
  0%, 100% { opacity: 0.4; }
  50% { opacity: 1; }
}

.bg-glow {
  position: absolute;
  top: 30%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 400px;
  height: 400px;
  background: radial-gradient(ellipse, rgba(201,168,76,0.07) 0%, transparent 65%);
  animation: glowPulse 6s ease-in-out infinite;
}

@keyframes glowPulse {
  0%, 100% { opacity: 0.6; transform: translate(-50%,-50%) scale(1); }
  50% { opacity: 1; transform: translate(-50%,-50%) scale(1.15); }
}

/* Scanline */
.bg-scan {
  position: absolute;
  left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(201,168,76,0.15), transparent);
  animation: scan 10s linear infinite;
}
@keyframes scan {
  0% { top: -1px; opacity: 0; }
  5% { opacity: 1; }
  95% { opacity: 1; }
  100% { top: 100%; opacity: 0; }
}

/* ── SHELL ── */
.shell {
  position: relative;
  z-index: 1;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 20px 60px;
  gap: 0;
}

/* ── CARD ── */
.card {
  width: 100%;
  max-width: 380px;
  background: var(--card);
  border: 1px solid var(--gold-border);
  padding: 0;
  position: relative;
  overflow: hidden;
  animation: cardIn 1s cubic-bezier(0.22,1,0.36,1) both;
}

@keyframes cardIn {
  from { opacity: 0; transform: translateY(32px) scale(0.96); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

/* Top accent line */
.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1.5px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
}

/* Corner marks */
.corner { position: absolute; width: 16px; height: 16px; }
.corner--tl { top: 10px; left: 10px; border-top: 1px solid var(--gold-border); border-left: 1px solid var(--gold-border); }
.corner--tr { top: 10px; right: 10px; border-top: 1px solid var(--gold-border); border-right: 1px solid var(--gold-border); }
.corner--bl { bottom: 10px; left: 10px; border-bottom: 1px solid var(--gold-border); border-left: 1px solid var(--gold-border); }
.corner--br { bottom: 10px; right: 10px; border-bottom: 1px solid var(--gold-border); border-right: 1px solid var(--gold-border); }

/* Ghost watermark */
.card-wm {
  position: absolute;
  top: -30px; right: -30px;
  opacity: 0.04;
  pointer-events: none;
}

/* ── CARD HEADER ── */
.card-header {
  padding: 44px 36px 32px;
  display: flex;
  flex-direction: column;
  align-items: center;
  border-bottom: 0.5px solid rgba(255,255,255,0.05);
  animation: fadeUp 0.9s 0.1s cubic-bezier(0.22,1,0.36,1) both;
}

.mark-wrap { margin-bottom: 20px; }

.wordmark {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  margin-bottom: 28px;
}
.wm-kanon {
  font-family: var(--mono);
  font-weight: 400;
  font-size: 14px;
  letter-spacing: 0.45em;
  color: rgba(255,255,255,0.9);
}
.wm-sub {
  font-family: var(--mono);
  font-size: 7px;
  letter-spacing: 0.38em;
  color: rgba(255,255,255,0.2);
  text-transform: uppercase;
}

.card-name {
  font-family: var(--serif);
  font-weight: 300;
  font-size: 24px;
  letter-spacing: 0.01em;
  color: #fff;
  text-align: center;
  margin-bottom: 8px;
}

.card-title {
  font-family: var(--mono);
  font-size: 8px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--gold);
  text-align: center;
  line-height: 1.6;
}

/* ── CONTACT BLOCK ── */
.card-contacts {
  padding: 24px 28px;
  display: flex;
  flex-direction: column;
  gap: 2px;
  animation: fadeUp 0.9s 0.25s cubic-bezier(0.22,1,0.36,1) both;
}

.contact-row {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 10px 10px;
  text-decoration: none;
  transition: background 0.2s;
  border-left: 1.5px solid transparent;
}
.contact-row:hover {
  background: rgba(201,168,76,0.05);
  border-left-color: var(--gold);
}

.c-icon {
  width: 30px;
  height: 30px;
  border: 0.5px solid var(--gold-border);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: border-color 0.2s, background 0.2s;
}
.contact-row:hover .c-icon {
  border-color: var(--gold);
  background: var(--gold-dim);
}

.c-info { display: flex; flex-direction: column; gap: 1px; }
.c-label {
  font-family: var(--mono);
  font-size: 7.5px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.22);
}
.c-value {
  font-family: var(--mono);
  font-size: 11.5px;
  color: rgba(255,255,255,0.65);
  transition: color 0.2s;
}
.contact-row:hover .c-value { color: #fff; }

/* ── DIVIDER ── */
.card-divider {
  height: 0.5px;
  background: rgba(255,255,255,0.06);
  margin: 0 28px;
}

/* ── QR + SAVE ── */
.card-footer {
  padding: 24px 28px 32px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
  animation: fadeUp 0.9s 0.4s cubic-bezier(0.22,1,0.36,1) both;
}

.qr-label {
  font-family: var(--mono);
  font-size: 7.5px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.18);
}

.qr-frame {
  padding: 10px;
  background: #0D1117;
  border: 0.5px solid var(--gold-border);
}

.save-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  width: 100%;
  padding: 13px 0;
  background: var(--gold);
  color: #060A0F;
  font-family: var(--mono);
  font-weight: 500;
  font-size: 9px;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  text-decoration: none;
  transition: background 0.2s, letter-spacing 0.2s;
  margin-top: 4px;
}
.save-btn:hover {
  background: #DDB95A;
  letter-spacing: 0.34em;
}

/* ── BOTTOM META ── */
.card-meta {
  margin-top: 28px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  animation: fadeUp 0.9s 0.55s cubic-bezier(0.22,1,0.36,1) both;
}
.meta-ref {
  font-family: var(--mono);
  font-size: 7px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.1);
}
.meta-url {
  font-family: var(--mono);
  font-size: 8px;
  letter-spacing: 0.1em;
  color: rgba(201,168,76,0.25);
  text-decoration: none;
  transition: color 0.2s;
}
.meta-url:hover { color: var(--gold); }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: translateY(0); }
}
</style>
</head>
